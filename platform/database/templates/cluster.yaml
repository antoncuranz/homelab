apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: database-cluster
spec:
  instances: 1
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:17-0.3.0
  postgresql:
    shared_preload_libraries:
      - "vchord.so"
  bootstrap:
    initdb:
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS vchord CASCADE;
  primaryUpdateStrategy: unsupervised
  storage:
    size: 10Gi
  superuserSecret:
    name: postgres-secret
  enableSuperuserAccess: true
  monitoring:
    enablePodMonitor: true
  managed:
    services:
      disabledDefaultServices: [ "ro", "r" ]
      additional:
        - selectorType: rw
          serviceTemplate:
            metadata:
              name: database-cluster-rw-lb
              annotations:
                lbipam.cilium.io/sharing-key: default
                lbipam.cilium.io/sharing-cross-namespace: "*"
                lbipam.cilium.io/ips: 192.168.1.11
            spec:
              type: LoadBalancer
  plugins:
    - enabled: true
      name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: b2-object-store
        serverName: database-cluster-c
