pod-gateway:
  configMaps:
    gluetun-post-rules:
      forceRename: vpn-gateway-pod-gateway-gluetun-post-rules
      data:
        post-rules.txt: |
          iptables -A INPUT -i eth0 -p icmp -j ACCEPT
  persistence:
    gluetun-post-rules:
      type: configMap
      identifier: gluetun-post-rules
      advancedMounts:
        main:
          gluetun:
            - path: /iptables/post-rules.txt
              subPath: post-rules.txt
              readOnly: true
  controllers:
    main:
      containers:
        main:
          image:
            repository: ghcr.io/angelnu/pod-gateway
            tag: v1.13.0
        gluetun:
          enabled: true
          image:
            repository: docker.io/qmcgaw/gluetun
            tag: v3.41.1
          env:
            PUBLICIP_API: cloudflare
          envFrom:
            - secretRef:
                name: wireguard-config
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
    webhook:
      containers:
        main:
          image:
            repository: ghcr.io/angelnu/gateway-admision-controller
            tag: v3.12.0
  networkpolicies:
    main:
      enabled: true
      controller: main
      policyTypes:
        - Egress
      rules:
        egress:
          - to:
              - ipBlock:
                  cidr: 0.0.0.0/0
            ports:
              - port: 1637
                protocol: UDP
          - to:
              - namespaceSelector: {}
  routed_namespaces:
    - servarr
    - vpn-proxy
  settings:
    VPN_INTERFACE: wg0
    VPN_BLOCK_OTHER_TRAFFIC: true
    VPN_TRAFFIC_PORT: 1637
    VXLAN_PORT: 4789
    NOT_ROUTED_TO_GATEWAY_CIDRS: "10.42.0.0/16 10.43.0.0/16"
    VPN_LOCAL_CIDRS: "10.42.0.0/16 10.43.0.0/16"
    IPTABLES_NFT: yes
    SNAT_IP: "10.142.189.251"
  webhook:
    gatewayDefault: false
  publicPorts:
    - IP: 10
      hostname: transmission
      ports:
        - port: 9453
          type: udp
        - port: 9453
          type: tcp
