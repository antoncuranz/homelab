kube-prometheus-stack:
  grafana:
    enabled: false
    forceDeployDatasources: true
  prometheus:
    prometheusSpec:
      ruleSelectorNilUsesHelmValues: false
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false
      additionalScrapeConfigs:
        - job_name: opnsense-node-exporter
          scrape_interval: 1m
          scrape_timeout: 10s
          static_configs:
            - targets:
                - 192.168.1.1:9100
      storageSpec:
        volumeClaimTemplate:
          spec:
            resources:
              requests:
                storage: 10Gi
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false
  alertmanager:
    alertmanagerSpec:
      secrets:
        - alertmanager-secrets
    config:
      global:
        resolve_timeout: 5m
      receivers:
        - name: "null"
        - name: "healthcheck"
          webhook_configs:
            - url_file: /etc/alertmanager/secrets/alertmanager-secrets/HEALTHCHECK_URL
        - name: "pushover"
          pushover_configs:
            - user_key_file: /etc/alertmanager/secrets/alertmanager-secrets/PUSHOVER_USER_KEY
              token_file: /etc/alertmanager/secrets/alertmanager-secrets/PUSHOVER_TOKEN
              device: iphone
              send_resolved: true
              html: true
              priority: |-
                {{ if eq .Status "firing" }}1{{ else }}0{{ end }}
              url_title: View in Alert Manager
              title: |-
                [{{ .Status | toUpper -}}
                {{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{- end -}}
                ] {{ .CommonLabels.alertname }}
              message: |-
                {{- range .Alerts }}
                  {{- if ne .Labels.severity "" }}
                    <b>Severity:</b> <i>{{ .Labels.severity }}</i>
                  {{- else }}
                    <b>Severity:</b> <i>N/A</i>
                  {{- end }}
                  {{- if ne .Annotations.description "" }}
                    <b>Description:</b> <i>{{ .Annotations.description }}</i>
                  {{- else if ne .Annotations.summary "" }}
                    <b>Summary:</b> <i>{{ .Annotations.summary }}</i>
                  {{- else if ne .Annotations.message "" }}
                    <b>Message:</b> <i>{{ .Annotations.message }}</i>
                  {{- else }}
                    <b>Description:</b> <i>N/A</i>
                  {{- end }}
                {{- end }}
      route:
        receiver: "pushover"
        routes:
          - receiver: "null"
            matchers:
              - alertname =~ "InfoInhibitor|RebootScheduled|NodeMemoryHighUtilization|NodeMemoryMajorPagesFaults|CPUThrottlingHigh"
          - receiver: "null"
            matchers:
              - namespace = "servarr"
              - pod =~ "servarr-jellyfin-.*"
              - alertname = "KubePodNotReady"
          - receiver: "null"
            matchers:
              - persistentvolumeclaim =~ "volsync-.*"
              - alertname =~ "KubePersistentVolume.*FillingUp"
          - receiver: "healthcheck"
            matchers:
              - alertname = "Watchdog"
            group_wait: 0s
            group_interval: 5m
            repeat_interval: 4m
          - receiver: "pushover"
            matchers:
              - severity = "critical"
            continue: true
      inhibit_rules:
        - source_matchers:
            - severity = "critical"
          target_matchers:
            - severity = "warning"
          equal: [ "alertname", "namespace" ]

influxdb:
  persistence:
    size: 2Gi
  service:
    type: LoadBalancer
    annotations:
      lbipam.cilium.io/sharing-key: default
      lbipam.cilium.io/sharing-cross-namespace: "*"
      lbipam.cilium.io/ips: 192.168.1.11
  initScripts:
    enabled: true
    scripts:
      init.iql: |+
        CREATE DATABASE "serverton"
