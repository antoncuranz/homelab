backend:
  global:
    nameOverride: backend


  controllers:
    main:
      strategy: RollingUpdate

      containers:
        main:
          image:
            repository: ghcr.io/antoncuranz/money-tracking/backend
            tag: latest
            pullPolicy: Always
          env:
            ACTUAL_BASE_URL: "http://actual.actual.svc.cluster.local:5007"
            ACTUAL_CAT_FX_FEES: "ff41dcbd-5962-4b32-b3fe-ce9d63cf9c25"
            ACTUAL_CAT_GROCERIES: "ff259c77-c898-447e-a156-9ee299e09a32"
            ACTUAL_CAT_DINING: "c1e2f6d7-dd3c-4f66-a1b4-eb6916aba30c"
            ACTUAL_UNKNOWN_PAYEE: "97f839af-dea1-4ec4-87c4-539112a3f478"
            PYDEVD_DISABLE_FILE_VALIDATION: "1"
            POSTGRES_HOST:
              valueFrom:
                secretKeyRef:
                  name: database-money-tracking-user
                  key: HOST
            POSTGRES_DATABASE:
              valueFrom:
                secretKeyRef:
                  name: database-money-tracking-user
                  key: DATABASE_NAME
            POSTGRES_USER:
              valueFrom:
                secretKeyRef:
                  name: database-money-tracking-user
                  key: LOGIN
            POSTGRES_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: database-money-tracking-user
                  key: PASSWORD
          envFrom:
            - secretRef:
                name: money-tracking-secrets

  service:
    main:
      ports:
        http:
          port: 80
  
  serviceMonitor:
    main:
      enabled: true
      endpoints:
        - port: http
          interval: 15m

frontend:
  global:
    nameOverride: frontend

  controllers:
    main:
      strategy: RollingUpdate

      containers:
        main:
          image:
            repository: ghcr.io/antoncuranz/money-tracking/frontend
            tag: latest
            pullPolicy: Always

  service:
    main:
      ports:
        http:
          port: 3000

  route:
    main:
      hostnames:
        - money-tracking.serverton.de
      parentRefs:
        - name: envoy-gateway
          namespace: envoy-gateway
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - identifier: main
              port: 3000
