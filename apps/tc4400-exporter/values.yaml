app-template:
  controllers:
    main:
      pod:
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet

      containers:
        main:
          image:
            repository: ghcr.io/antoncuranz/tc4400_exporter
            tag: latest
            pullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: tc4400-exporter-secrets

  service:
    main:
      ports:
        metrics:
          port: 9623

  serviceMonitor:
    main:
      enabled: true
      endpoints:
        - port: metrics
          path: /metrics
          interval: 1m
          scrapeTimeout: 55s
