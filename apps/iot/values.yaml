mosquitto:
  global:
    nameOverride: mosquitto
  controllers:
    main:
      containers:
        main:
          image:
            repository: docker.io/library/eclipse-mosquitto
            tag: 2.0.22
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ "ALL" ] }
          resources:
            requests:
              cpu: 10m
            limits:
              memory: 16Mi
      pod:
        securityContext:
          runAsUser: 568
          runAsGroup: 568
          runAsNonRoot: true
          fsGroup: 568
          fsGroupChangePolicy: OnRootMismatch
  service:
    main:
      type: LoadBalancer
      annotations:
        lbipam.cilium.io/sharing-key: default
        lbipam.cilium.io/sharing-cross-namespace: "*"
        lbipam.cilium.io/ips: 192.168.1.11
      ports:
        mqtt:
          enabled: true
          port: 1883
  persistence:
    mosquitto-conf:
      type: configMap
      name: mosquitto-config
      globalMounts:
        - path: /mosquitto/config/mosquitto.conf
          subPath: mosquitto.conf
    secret:
      type: secret
      name: mqtt-secret
      globalMounts:
        - path: /mosquitto/mosquitto_pwd
          subPath: mosquitto_pwd
    tibber:
      enabled: true
      type: secret
      name: tibber-secret
      globalMounts:
        - path: /mosquitto/tibber_certs
    data:
      enabled: true
      accessMode: ReadWriteOnce
      size: 250Mi
      globalMounts:
        - path: /mosquitto/data
      dataSourceRef:
        kind: ReplicationDestination
        apiGroup: volsync.backube
        name: mosquitto-dst

node-red:
  global:
    nameOverride: node-red
  controllers:
    main:
      pod:
        securityContext:
          runAsUser: 568
          runAsGroup: 568
          fsGroup: 568
          fsGroupChangePolicy: "OnRootMismatch"

      containers:
        main:
          image:
            repository: docker.io/nodered/node-red
            tag: 4.1.8
          resources:
            requests:
              cpu: 5m
              memory: 512Mi
            limits:
              memory: 512Mi
  service:
    main:
      ports:
        http:
          port: 1880
  route:
    main:
      hostnames:
        - mqtt.serverton.de
      parentRefs:
        - name: envoy-gateway
          namespace: envoy-gateway
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - identifier: main
              port: 1880
  persistence:
    data:
      enabled: true
      accessMode: ReadWriteOnce
      size: 250Mi
      globalMounts:
        - path: /data
      dataSourceRef:
        kind: ReplicationDestination
        apiGroup: volsync.backube
        name: node-red-dst
