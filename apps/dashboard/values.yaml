app-template:
  controllers:
    main:
      strategy: RollingUpdate

      initContainers:
        www-provider:
          image:
            repository: registry.gitlab.com/antoncuranz/dashboard
            tag: latest
          command:
            - sh
          args:
            - -c
            - |
              echo "Copying www..."
              cp -R /www/* /volume

      containers:
        main:
          image:
            repository: ghcr.io/linuxserver/nginx
            tag: version-1.28.3-r0
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 80
                initialDelaySeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 100Mi
            limits:
              memory: 750Mi

  persistence:
    www:
      enabled: true
      type: emptyDir
      advancedMounts:
        main:
          www-provider:
            - path: /volume
          main:
            - path: /config/www

  service:
    main:
      ports:
        http:
          port: 80

  route:
    main:
      hostnames:
        - serverton.de
      parentRefs:
        - name: envoy-gateway
          namespace: envoy-gateway
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - identifier: main
              port: 80
