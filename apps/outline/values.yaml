app-template:

  controllers:
    main:
      strategy: RollingUpdate

      containers:
        main:
          image:
            repository: docker.getoutline.com/outlinewiki/outline
            tag: latest
          env:
            URL: "https://outline.serverton.de"
            REDIS_URL: "redis://localhost:6379"
            DATABASE_URL:
              valueFrom:
                secretKeyRef:
                  name: database-outline-user
                  key: POSTGRES_URL
            PGSSLMODE: "disable"
            FILE_STORAGE: "local"
            FILE_STORAGE_LOCAL_ROOT_DIR: "/var/lib/outline/data"
            FILE_STORAGE_UPLOAD_MAX_SIZE: "26214400"
          envFrom:
            - secretRef:
                name: outline-secret
          securityContext:
            runAsUser: 1001
            runAsGroup: 65533
        redis:
          image:
            repository: public.ecr.aws/docker/library/redis
            tag: 8.6.2

      pod:
        securityContext:
          fsGroup: 65533
          fsGroupChangePolicy: Always

  persistence:
    data:
      enabled: true
      accessMode: ReadWriteOnce
      size: 5Gi
      advancedMounts:
        main:
          main:
            - path: /var/lib/outline/data
      dataSourceRef:
        kind: ReplicationDestination
        apiGroup: volsync.backube
        name: outline-dst

  service:
    main:
      ports:
        http:
          port: 3000

  route:
    main:
      hostnames:
        - "outline.serverton.de"
      parentRefs:
        - name: envoy-gateway
          namespace: envoy-gateway
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - identifier: main
              port: 3000
