tc4400-exporter:
  global:
    nameOverride: tc4400-exporter

  controllers:
    main:
      pod:
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet

      containers:
        main:
          image:
            repository: ghcr.io/antoncuranz/tc4400_exporter
            tag: latest
            pullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: tc4400-exporter-secrets

  service:
    main:
      ports:
        metrics:
          port: 9623

  serviceMonitor:
    main:
      enabled: true
      endpoints:
        - port: metrics
          path: /metrics
          interval: 1m
          scrapeTimeout: 55s

docsight:
  global:
    nameOverride: docsight

  controllers:
    main:
      replicas: 0
      pod:
        securityContext:
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch

      containers:
        main:
          image:
            repository: ghcr.io/itsdnns/docsight
            tag: latest
            pullPolicy: IfNotPresent
          probes:
            liveness: &docsightProbes
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /health
                  port: 8765
                initialDelaySeconds: 15
                periodSeconds: 15
                timeoutSeconds: 5
                failureThreshold: 4
            readiness: *docsightProbes
            startup:
              enabled: false

  persistence:
    data:
      enabled: true
      accessMode: ReadWriteOnce
      size: 5Gi
      globalMounts:
        - path: /data

  service:
    main:
      ports:
        http:
          port: 8765

  route:
    main:
      hostnames:
        - docsight.serverton.de
      parentRefs:
        - name: envoy-gateway
          namespace: envoy-gateway
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - identifier: main
              port: 8765

opnsense-exporter:
  global:
    nameOverride: opnsense-exporter

  controllers:
    main:
      containers:
        main:
          image:
            repository: ghcr.io/athennamind/opnsense-exporter
            tag: 0.0.16
            pullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: opnsense-exporter-secrets
          probes:
            liveness: &opnsenseExporterProbes
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 8080
            readiness: *opnsenseExporterProbes

  service:
    main:
      type: ClusterIP
      ports:
        http:
          port: 8080

  serviceMonitor:
    main:
      enabled: true
      endpoints:
        - port: http
          path: /metrics
          interval: 1m
          scrapeTimeout: 10s
