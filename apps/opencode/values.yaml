app-template:
  defaultPodOptions:
    automountServiceAccountToken: false

  serviceAccount:
    create: true

  controllers:
    main:
      strategy: RollingUpdate

      pod:
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
          seccompProfile:
            type: RuntimeDefault

      containers:
        main:
          image:
            repository: ghcr.io/antoncuranz/opencode-image
            tag: latest
            pullPolicy: Always
          env:
            TZ: Europe/Berlin
            GH_TOKEN:
              valueFrom:
                secretKeyRef:
                  name: opencode-secrets
                  key: GH_TOKEN
            OPENCODE_SERVER_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: opencode-secrets
                  key: OPENCODE_SERVER_PASSWORD
          probes:
            liveness: &probe
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: 4096
                initialDelaySeconds: 30
                periodSeconds: 15
                timeoutSeconds: 2
                failureThreshold: 5
            readiness:
              <<: *probe
              spec:
                tcpSocket:
                  port: 4096
                initialDelaySeconds: 5
                periodSeconds: 10
                timeoutSeconds: 2
                failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

  persistence:
    workspace:
      enabled: true
      accessMode: ReadWriteOnce
      size: 20Gi
      annotations:
        k8up.io/backup: "false"
      advancedMounts:
        main:
          main:
            - path: /workspace

  service:
    main:
      ports:
        http:
          port: 4096

  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        external-dns.alpha.kubernetes.io/target: lb1.serverton.de
      hosts:
        - host: &host oc.serverton.de
          paths:
            - path: /
              service:
                name: main
                port: http
      tls:
        - secretName: opencode-tls-certificate
          hosts:
            - *host
