app-template:
  controllers:
    main:
      strategy: RollingUpdate

      pod:
        securityContext:
          runAsUser: 1001
          runAsGroup: 1001
          fsGroup: 1001
          fsGroupChangePolicy: OnRootMismatch

      containers:
        main:
          image:
            repository: actualbudget/actual-server
            tag: 26.6.0
          env:
            TZ: "Europe/Berlin"
            ACTUAL_PORT: "5006"
            ACTUAL_LOGIN_METHOD: "openid"
        rest:
          image:
            repository: docker.io/jhonderson/actual-http-api
            tag: 26.6.1
            pullPolicy: Always
          env:
            ACTUAL_SERVER_URL: "http://actual.actual.svc.cluster.local:5006"
          envFrom:
            - secretRef:
                name: actual-secrets

  persistence:
    data:
      enabled: true
      accessMode: ReadWriteOnce
      size: 4Gi
      dataSourceRef:
        kind: ReplicationDestination
        apiGroup: volsync.backube
        name: actual-dst

  service:
    main:
      ports:
        http:
          port: 5006
        rest:
          port: 5007

  route:
    main:
      hostnames:
        - "actual.serverton.de"
      parentRefs:
        - name: envoy-gateway
          namespace: envoy-gateway
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - identifier: main
              port: 5006

sync:
  global:
    nameOverride: sync

  controllers:
    main:
      strategy: RollingUpdate

      containers:
        main:
          image:
            repository: ghcr.io/antoncuranz/actual-sync
            tag: latest
            pullPolicy: Always
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: 8080
                initialDelaySeconds: 30
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: 8080
                initialDelaySeconds: 5
          env:
            LOG_LEVEL: "info"
            HTTP_PORT: "8080"
            ACTUAL_BASE_URL: "http://actual.actual.svc.cluster.local:5007/v1"
          envFrom:
            - secretRef:
                name: actual-sync-secrets

  service:
    main:
      ports:
        http:
          port: 8080
