---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: homebridge
  namespace: homebridge
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: homebridge
  oidc:
    provider:
      issuer: https://keycloak.serverton.de/realms/serverton
    clientID: oauth2-proxy
    clientSecret:
      name: oauth2-secrets
    redirectURL: https://homebridge.serverton.de/oauth2/callback
    logoutPath: /oauth2/logout
