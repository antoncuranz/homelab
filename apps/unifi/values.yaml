app-template:
  controllers:
    main:
      pod:
        securityContext:
          runAsUser: 999
          runAsGroup: 999
          fsGroup: 999
          fsGroupChangePolicy: OnRootMismatch

      containers:
        main:
          image:
            repository: jacobalberty/unifi
            tag: v10.0.162
          env:
            TZ: "Europe/Berlin"
            RUNAS_UID0: "false"
            UNIFI_UID: "999"
            UNIFI_GID: "999"
            UNIFI_STDOUT: "true"
            JVM_INIT_HEAP_SIZE:
            JVM_MAX_HEAP_SIZE: 1024M
          resources:
            requests:
              memory: 2Gi
              cpu: 50m

  persistence:
    config:
      enabled: true
      accessMode: ReadWriteOnce
      size: 10Gi
      globalMounts:
        - path: /unifi
      dataSourceRef:
        kind: ReplicationDestination
        apiGroup: volsync.backube
        name: unifi-dst
    cert:
      type: secret
      name: unifi-tls
      advancedMounts:
        main:
          main:
            - path: /unifi/cert/cert.pem
              subPath: tls.crt
              readOnly: true
            - path: /unifi/cert/privkey.pem
              subPath: tls.key
              readOnly: true

  service:
    main:
      type: LoadBalancer
      annotations:
        lbipam.cilium.io/sharing-key: default
        lbipam.cilium.io/sharing-cross-namespace: "*"
        lbipam.cilium.io/ips: 192.168.1.11
      ports:
        http:
          port: 8443
          protocol: HTTPS
          appProtocol: https
        controller:
          enabled: true
          port: 8080
          protocol: TCP
        portal-http:
          enabled: false
          port: 8880
          protocol: HTTP
        portal-https:
          enabled: false
          port: 8843
          protocol: HTTPS
        speedtest:
          enabled: true
          port: 6789
          protocol: TCP
        stun:
          enabled: true
          port: 3478
          protocol: UDP
        syslog:
          enabled: true
          port: 5514
          protocol: UDP
        discovery:
          enabled: true
          port: 10001
          protocol: UDP

  rawResources:
    backend-tls-policy:
      apiVersion: gateway.networking.k8s.io/v1alpha3
      kind: BackendTLSPolicy
      spec:
        spec:
          targetRefs:
            - group: ""
              kind: Service
              name: unifi-main
              sectionName: http
          validation:
            hostname: unifi.serverton.de
            wellKnownCACertificates: System

  route:
    main:
      enabled: true
      hostnames:
        - unifi.serverton.de
      parentRefs:
        - name: envoy-gateway
          namespace: envoy-gateway
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: main
              port: 8443
