cilium:
  kubeProxyReplacement: true
  k8sServiceHost: 192.168.1.2
  k8sServicePort: 6443

  ipam:
    operator:
      clusterPoolIPv4PodCIDRList:
        - 10.42.0.0/16

  l2announcements:
    enabled: true

  k8sClientRateLimit:
    qps: 20
    burst: 40

  operator:
    replicas: 1
    rollOutPods: true

  rollOutCiliumPods: true

  hubble:
    relay:
      enabled: true
    ui:
      enabled: true
